version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autohub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: autohub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_PATH: /n8n/
      N8N_HOST: ${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${DOMAIN}/n8n/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: autohub
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      GENERIC_TIMEZONE: ${TIMEZONE}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://autohub:${POSTGRES_PASSWORD}@postgres:5432/autohub
      REDIS_URL: redis://redis:6379
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      N8N_API_KEY: ${N8N_API_KEY}
      N8N_URL: http://n8n:5678
      PLUGIN_DIR: /app/plugins
      TIMEZONE: ${TIMEZONE}
      TERMINAL_DIRS: /workspace/home,/workspace/repo
    volumes:
      - plugins_data:/app/plugins
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped

  terminal:
    build: ./terminal
    environment:
      JWT_SECRET: ${JWT_SECRET}
      TERMINAL_DIRS: /workspace/home,/workspace/repo
    volumes:
      - /home/dama:/workspace/home:rw
      - /home/dama/repo/auto-hub:/workspace/repo:rw
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      - frontend
      - backend
      - n8n
      - terminal
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: host
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
  plugins_data:
