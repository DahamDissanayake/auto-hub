events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Use Docker's embedded DNS so upstream hostnames are re-resolved on every
    # request rather than cached at startup. This means nginx never needs a
    # restart when backend or frontend containers are recreated.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Only send Connection: upgrade for actual WebSocket/SSE upgrade requests;
    # fall back to keep-alive for plain HTTP so n8n's push (SSE) endpoint works.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      keep-alive;
    }

    server {
        listen 80;

        location /api/ {
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

            set $backend http://backend:4000;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /n8n {
            return 301 https://$host/n8n/;
        }

        # n8n serves assets at /assets/ and /static/ internally (not /n8n/assets/).
        # Strip the /n8n/ prefix so asset requests resolve correctly.
        # n8n's own security headers are sufficient; a restrictive CSP here would
        # block the data: script URIs n8n uses for expression evaluation.
        location /n8n/ {
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;

            auth_basic "AutoHub";
            auth_basic_user_file /etc/nginx/htpasswd;

            # set must come before rewrite — break stops all rewrite-module
            # directives (including set) that follow it.
            set $n8n http://n8n:5678;

            # Strip /n8n/ prefix before forwarding — proxy_pass with a variable
            # does NOT perform automatic path substitution, so we do it explicitly.
            rewrite ^/n8n/(.*)$ /$1 break;

            proxy_pass $n8n;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect http://$host/ https://$host/n8n/;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        location /terminal-ws/ {
            set $terminal http://terminal:7681;
            proxy_pass $terminal;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        location /files-api/ {
            set $files http://files:5050;
            rewrite ^/files-api/(.*)$ /$1 break;
            proxy_pass $files;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /mails-api/ {
            set $mails http://mails:3001;
            rewrite ^/mails-api/(.*)$ /$1 break;
            proxy_pass $mails;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

            set $frontend http://frontend:3000;
            proxy_pass $frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
